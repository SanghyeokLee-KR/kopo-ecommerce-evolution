<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SANG GALLERY | 상품 목록</title>
    <link rel="icon" th:href="@{/img/favicon.ico}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-product.css}">

    <script th:src="@{/js/common/header.js}" defer></script>
</head>
<body>

<div th:replace="~{common/header :: header}"></div>

<main class="admin-product-page">

    <section class="admin-product-header">
        <div>
            <p>SANG GALLERY ADMIN</p>
            <h1>상품 관리</h1>
            <span>상품 등록, 수정, 삭제와 재고 상태를 관리할 수 있습니다.</span>
        </div>

        <a th:href="@{/admin}" class="admin-back-link">
            관리자 대시보드
        </a>
    </section>

    <section class="admin-product-layout">

        <aside class="product-form-panel">
            <h2>상품 등록</h2>

            <form th:action="@{/admin/products}"
                  method="post"
                  enctype="multipart/form-data"
                  class="product-form">

                <label for="nmProduct">상품명</label>
                <input type="text" id="nmProduct" name="nmProduct" required>

                <label for="dcProduct">상세 설명</label>
                <textarea id="dcProduct" name="dcProduct" required></textarea>

                <label for="dtSellStart">판매 일자</label>
                <input type="date" id="dtSellStart" name="dtSellStart" required>

                <label for="qtPrice">가격</label>
                <input type="number" id="qtPrice" name="qtPrice" min="0" required>

                <label for="qtStock">재고 수량</label>
                <input type="number" id="qtStock" name="qtStock" min="0" required>

                <label for="nbCategory">카테고리</label>
                <select id="nbCategory" name="nbCategory" required>
                    <option value="">중분류 카테고리 선택</option>

                    <optgroup th:each="parent : ${categories}"
                              th:if="${parent.cnLevel == 1}"
                              th:label="${parent.nmCategory} + ' (대분류)'">

                        <option th:each="child : ${categories}"
                                th:if="${child.nbParentCategory == parent.nbCategory}"
                                th:value="${child.nbCategory}"
                                th:text="${child.nmCategory} + ' (중분류)'">
                            중분류
                        </option>

                    </optgroup>
                </select>

                <label for="productImage">상품 이미지</label>
                <input type="file"
                       id="productImage"
                       name="productImage"
                       accept="image/*">

                <button type="submit">
                    상품 등록
                </button>
            </form>
        </aside>

        <section class="product-list-panel">
            <div class="product-list-title">
                <h2>상품 목록</h2>
                <span th:text="'총 ' + ${productPage.totalElements} + '개 상품'">
                    총 0개 상품
                </span>
            </div>

            <div th:if="${#lists.isEmpty(products)}"
                 class="empty-product">
                등록된 상품이 없습니다.
            </div>

            <div class="admin-product-table-wrap"
                 th:if="${!#lists.isEmpty(products)}">

                <table class="admin-product-table">
                    <thead>
                    <tr>
                        <th>이미지</th>
                        <th>상품 정보</th>
                        <th>판매 일자</th>
                        <th>가격</th>
                        <th>재고</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="product : ${products}">
                        <td>
                            <a th:href="@{/products/{nbProduct}(nbProduct=${product.nbProduct})}"
                               class="product-thumb">
                                <img th:if="${product.imagePath != null}"
                                     th:src="@{${product.imagePath}}"
                                     th:alt="${product.nmProduct}">

                                <span th:if="${product.imagePath == null}">
                                    NO IMAGE
                                </span>
                            </a>
                        </td>

                        <td>
                            <div class="product-info">
                                <strong th:text="${product.nmProduct}">
                                    상품명
                                </strong>
                                <small th:text="'상품번호 ' + ${product.nbProduct}">
                                    상품번호
                                </small>
                            </div>
                        </td>

                        <td th:text="${product.dtSellStart}">
                            20260101
                        </td>

                        <td th:text="${#numbers.formatInteger(product.qtPrice, 3, 'COMMA')} + '원'">
                            0원
                        </td>

                        <td th:text="${product.qtStock} + '개'">
                            0개
                        </td>

                        <td>
                            <span class="product-status"
                                  th:classappend="${product.qtStock != null and product.qtStock <= 0} ? ' soldout' : ' selling'"
                                  th:text="${product.qtStock != null and product.qtStock <= 0} ? '품절' : '판매중'">
                                판매중
                            </span>
                        </td>

                        <td>
                            <div class="product-actions">
                                <a th:href="@{/admin/products/{nbProduct}/edit(nbProduct=${product.nbProduct})}">
                                    수정
                                </a>

                                <form th:action="@{/admin/products/{nbProduct}/delete(nbProduct=${product.nbProduct})}"
                                      method="post">
                                    <button type="submit"
                                            onclick="return confirm('상품을 삭제하시겠습니까?');">
                                        삭제
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div class="admin-product-pagination"
                     th:if="${productPage.totalPages > 0}">

                    <a th:if="${productPage.hasPrevious()}"
                       th:href="@{/admin/products(page=${productPage.number - 1})}">
                        Prev
                    </a>

                    <span th:text="${productPage.number + 1} + ' / ' + ${productPage.totalPages}">
                        1 / 1
                    </span>

                    <a th:if="${productPage.hasNext()}"
                       th:href="@{/admin/products(page=${productPage.number + 1})}">
                        Next
                    </a>
                </div>

            </div>
        </section>

    </section>

</main>

</body>
</html>
