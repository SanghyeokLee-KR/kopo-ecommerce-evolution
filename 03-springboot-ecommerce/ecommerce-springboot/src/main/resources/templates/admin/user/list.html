<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SANG GALLERY | 유저 관리</title>
    <link rel="icon" th:href="@{/img/favicon.ico}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-user.css}">

    <script th:src="@{/js/common/header.js}" defer></script>
</head>
<body>

<div th:replace="~{common/header :: header}"></div>

<main class="admin-user-page">

    <section class="admin-user-header">
        <div>
            <p>SANG GALLERY ADMIN</p>
            <h1>회원 관리</h1>
            <span>회원 상태와 권한을 관리할 수 있습니다.</span>
        </div>

        <a th:href="@{/admin}" class="admin-back-link">
            관리자 대시보드
        </a>
    </section>

    <section class="admin-user-filter">
        <a th:href="@{/admin/users}"
           th:classappend="${selectedStatus == null or selectedStatus == ''} ? ' active'">
            전체
        </a>

        <a th:href="@{/admin/users(stStatus='ST01')}"
           th:classappend="${selectedStatus == 'ST01'} ? ' active'">
            정상
        </a>

        <a th:href="@{/admin/users(stStatus='ST02')}"
           th:classappend="${selectedStatus == 'ST02'} ? ' active'">
            해지
        </a>

        <a th:href="@{/admin/users(stStatus='ST03')}"
           th:classappend="${selectedStatus == 'ST03'} ? ' active'">
            가입요청
        </a>

        <a th:href="@{/admin/users(stStatus='ST04')}"
           th:classappend="${selectedStatus == 'ST04'} ? ' active'">
            탈퇴요청
        </a>
    </section>

    <section class="admin-user-table-wrap">

        <table class="admin-user-table">
            <thead>
            <tr>
                <th>번호</th>
                <th>아이디</th>
                <th>이름</th>
                <th>휴대전화</th>
                <th>이메일</th>
                <th>상태</th>
                <th>권한</th>
                <th>상태 변경</th>
                <th>권한 변경</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="9" class="empty-cell">
                    조회된 회원이 없습니다.
                </td>
            </tr>

            <tr th:each="user : ${users}">
                <td th:text="${user.nbUser}">1</td>

                <td th:text="${user.idUser}">user01</td>

                <td th:text="${user.nmUser}">홍길동</td>

                <td th:text="${user.noMobile}">010-0000-0000</td>

                <td th:text="${user.nmEmail}">test@test.com</td>

                <td>
                    <span class="status-badge"
                          th:classappend="${user.stStatus}"
                          th:text="${user.stStatus}">
                        ST01
                    </span>
                </td>

                <td>
                    <span class="type-badge"
                          th:text="${user.cdUserType == '20'} ? '관리자' : '일반회원'">
                        일반회원
                    </span>
                </td>

                <td>
                    <form th:action="@{/admin/users/{nbUser}/status(nbUser=${user.nbUser})}"
                          method="post"
                          class="inline-form">

                        <input type="hidden"
                               name="selectedStatus"
                               th:value="${selectedStatus}">

                        <input type="hidden"
                               name="page"
                               th:value="${userPage.number}">

                        <select name="stStatus">
                            <option value="ST01" th:selected="${user.stStatus == 'ST01'}">정상</option>
                            <option value="ST02" th:selected="${user.stStatus == 'ST02'}">해지</option>
                            <option value="ST03" th:selected="${user.stStatus == 'ST03'}">가입요청</option>
                            <option value="ST04" th:selected="${user.stStatus == 'ST04'}">탈퇴요청</option>
                        </select>

                        <button type="submit">
                            변경
                        </button>
                    </form>
                </td>

                <td>
                    <form th:action="@{/admin/users/{nbUser}/type(nbUser=${user.nbUser})}"
                          method="post"
                          class="inline-form">

                        <input type="hidden"
                               name="selectedStatus"
                               th:value="${selectedStatus}">

                        <input type="hidden"
                               name="page"
                               th:value="${userPage.number}">

                        <select name="cdUserType">
                            <option value="10" th:selected="${user.cdUserType == '10'}">일반</option>
                            <option value="20" th:selected="${user.cdUserType == '20'}">관리자</option>
                        </select>

                        <button type="submit">
                            변경
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="admin-user-pagination"
             th:if="${userPage.totalPages > 0}">

            <a th:if="${userPage.hasPrevious()}"
               th:href="@{/admin/users(
                    page=${userPage.number - 1},
                    stStatus=${selectedStatus}
               )}">
                Prev
            </a>

            <span th:text="${userPage.number + 1} + ' / ' + ${userPage.totalPages}">
                1 / 1
            </span>

            <a th:if="${userPage.hasNext()}"
               th:href="@{/admin/users(
                    page=${userPage.number + 1},
                    stStatus=${selectedStatus}
               )}">
                Next
            </a>
        </div>

    </section>

</main>

</body>
</html>
