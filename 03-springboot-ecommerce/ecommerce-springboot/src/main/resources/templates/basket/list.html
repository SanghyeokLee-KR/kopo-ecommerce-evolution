<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SANG GALLERY | 장바구니</title>
    <link rel="icon" th:href="@{/img/favicon.ico}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/basket/basket.css}">

    <script th:src="@{/js/common/header.js}" defer></script>
</head>
<body>

<div th:replace="~{common/header :: header}"></div>

<main class="basket-page">
    <section class="basket-header">
        <p class="basket-subtitle">SANG GALLERY</p>
        <h1>CART</h1>
    </section>

    <section class="basket-layout">

        <div class="basket-list">

            <div class="basket-select-all" th:if="${!#lists.isEmpty(basket.items)}">
                <label>
                    <input type="checkbox" id="selectAll">
                    <span>전체 선택</span>
                </label>
            </div>

            <p th:if="${#lists.isEmpty(basket.items)}" class="empty-message">
                장바구니가 비어 있습니다.
            </p>

            <article class="basket-item"
                     th:each="item : ${basket.items}">

                <label class="basket-check">
                    <input type="checkbox"
                           class="basket-check-input"
                           name="nbBasketItemIds"
                           th:value="${item.nbBasketItem}"
                           form="orderForm">
                </label>

                <a class="basket-image"
                   th:href="@{/products/{nbProduct}(nbProduct=${item.nbProduct})}">
                    <img th:if="${item.imagePath != null}"
                         th:src="@{${item.imagePath}}"
                         th:alt="${item.nmProduct}">
                    <div th:if="${item.imagePath == null}" class="no-image">
                        NO IMAGE
                    </div>
                </a>

                <div class="basket-info">
                    <a th:href="@{/products/{nbProduct}(nbProduct=${item.nbProduct})}"
                       class="basket-product-name"
                       th:text="${item.nmProduct}">
                        상품명
                    </a>

                    <p class="basket-price"
                       th:text="${#numbers.formatInteger(item.unitPrice, 3, 'COMMA')} + '원'">
                        0원
                    </p>

                    <form th:action="@{/basket/items/{nbBasketItem}/quantity(nbBasketItem=${item.nbBasketItem})}"
                          method="post"
                          class="quantity-form">
                        <label>수량</label>
                        <input type="number"
                               name="quantity"
                               min="1"
                               th:value="${item.quantity}">
                        <button type="submit">변경</button>
                    </form>
                </div>

                <div class="basket-amount-area">
                    <p th:text="${#numbers.formatInteger(item.amount, 3, 'COMMA')} + '원'">
                        0원
                    </p>

                    <form th:action="@{/basket/items/{nbBasketItem}/delete(nbBasketItem=${item.nbBasketItem})}"
                          method="post">
                        <button type="submit"
                                class="btn-delete"
                                onclick="return confirm('삭제하시겠습니까?');">
                            삭제
                        </button>
                    </form>
                </div>
            </article>
        </div>

        <aside class="basket-summary">
            <h2>ORDER SUMMARY</h2>

            <div class="summary-row">
                <span>상품 금액</span>
                <strong th:text="${#numbers.formatInteger(basket.totalAmount, 3, 'COMMA')} + '원'">
                    0원
                </strong>
            </div>

            <div class="summary-row">
                <span>배송비</span>
                <strong>3,000원</strong>
            </div>

            <div class="summary-row total">
                <span>총 결제 금액</span>
                <strong th:if="${basket.totalAmount > 0}"
                        th:text="${#numbers.formatInteger(basket.totalAmount + 3000, 3, 'COMMA')} + '원'">
                    0원
                </strong>
                <strong th:if="${basket.totalAmount == 0}">
                    0원
                </strong>
            </div>

            <form id="orderForm" th:action="@{/orders}" method="post">
                <button type="submit"
                        class="btn-order"
                        th:disabled="${#lists.isEmpty(basket.items)}"
                        onclick="return validateSelectedOrder();">
                    주문하기
                </button>
            </form>

            <form th:action="@{/basket/clear}" method="post">
                <button type="submit"
                        class="btn-clear"
                        th:disabled="${#lists.isEmpty(basket.items)}"
                        onclick="return confirm('장바구니를 비우시겠습니까?');">
                    장바구니 비우기
                </button>
            </form>

            <a th:href="@{/products}" class="continue-link">
                쇼핑 계속하기
            </a>
        </aside>

    </section>
</main>

<script>
    const selectAll = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.basket-check-input');

    if (selectAll) {
        selectAll.addEventListener('change', function () {
            checkboxes.forEach(function (checkbox) {
                checkbox.checked = selectAll.checked;
            });
        });
    }

    checkboxes.forEach(function (checkbox) {
        checkbox.addEventListener('change', function () {
            if (!selectAll) return;

            const checkedCount =
                document.querySelectorAll('.basket-check-input:checked').length;

            selectAll.checked = checkedCount === checkboxes.length;
        });
    });

    function validateSelectedOrder() {
        const checkedCount =
            document.querySelectorAll('.basket-check-input:checked').length;

        if (checkedCount === 0) {
            alert('주문할 상품을 선택해주세요.');
            return false;
        }

        return confirm('선택한 상품을 주문하시겠습니까?');
    }
</script>

</body>
</html>
