<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>에러페이지</title>
    <link rel="icon" th:href="@{/img/favicon.ico}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--깃허브에 가져온 페이지입니다.-->
    <style>
        /* 기본 스타일 초기화 및 부드러운 폰트 적용 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333333;
            padding: 20px;
        }

        /* 에러 카드 레이아웃 */
        .error-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            border-top: 5px solid #dc3545; /* 에러를 뜻하는 붉은색 포인트 바 */
        }

        /* 경고 아이콘 (CSS로 구현) */
        .error-icon {
            width: 64px;
            height: 64px;
            background-color: #fdf2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .error-icon svg {
            width: 32px;
            height: 32px;
            color: #dc3545;
        }

        /* 텍스트 스타일링 */
        h2 {
            font-size: 22px;
            font-weight: 700;
            color: #111111;
            margin-bottom: 12px;
        }

        .error-message-box {
            background-color: #fafafa;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 28px;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-message {
            font-size: 15px;
            color: #555555;
            line-height: 1.5;
            word-break: keep-all; /* 한글 단어 잘림 방지 */
        }

        /* 버튼 및 링크 스타일 */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn-home {
            background-color: #222222;
            color: #ffffff;
        }

        .btn-home:hover {
            background-color: #444444;
        }

        .btn-back {
            background-color: #ffffff;
            color: #555555;
            border: 1px solid #cccccc;
        }

        .btn-back:hover {
            background-color: #f5f5f5;
            color: #333333;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>

    <h2>안내해 드립니다</h2>

    <div class="error-message-box">
        <p class="error-message" th:text="${errorMessage}">오류 메시지가 이곳에 표시됩니다.</p>
    </div>

    <div class="btn-group">
        <a href="javascript:history.back();" class="btn btn-back">이전 페이지</a>
        <a href="/" class="btn btn-home">홈으로 이동</a>
    </div>
</div>

</body>
</html>
