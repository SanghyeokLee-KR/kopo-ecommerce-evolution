<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANG GALLERY | 이상혁 갤러리</title>
    <link rel="icon" th:href="@{/img/favicon.ico}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <script th:src="@{/js/common/header.js}" defer></script>
    <script th:src="@{/js/index.js}" defer></script>
</head>
<body>

<div th:replace="~{common/header :: header}"></div>

<section class="hero-split reverse">
    <div class="hero-text-area">
        <p class="hero-subtitle">Lee Sang Hyeok Photography</p>
        <h1 class="hero-title">SANG GALLERY</h1>
        <p class="hero-description">
            이상혁 갤러리에 오신 것을 환영합니다.<br>
        </p>
        <a href="#gallery" class="btn-outline">갤러리 보기</a>
    </div>

    <div class="hero-image-area">
        <div class="image-caption">SANG GALLERY SEOUL</div>
    </div>
</section>

<section id="gallery" class="gallery-preview">
    <div class="section-header">
        <h2>최신 사진</h2>
        <p>이상혁이 엄선한 최고의 사진들</p>
    </div>

    <div class="grid-container">
        <div class="grid-item" th:each="product : ${products}">

            <a th:href="@{/products/{nbProduct}(nbProduct=${product.nbProduct})}">
                <img th:src="${product.imagePath}"
                     th:alt="${product.nmProduct}">
            </a>

            <div class="item-info">
                <h3>
                    <a th:href="@{/products/{nbProduct}(nbProduct=${product.nbProduct})}"
                       th:text="${product.nmProduct}">
                        작품명
                    </a>
                </h3>

                <p th:text="${#numbers.formatInteger(product.qtPrice, 3, 'COMMA') + '원'}">
                    원
                </p>
            </div>
        </div>
    </div>
</section>

</body>
</html>
