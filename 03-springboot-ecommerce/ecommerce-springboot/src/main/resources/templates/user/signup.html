<!-- templates/user/signup.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SANG GALLERY | 회원가입</title>
    <link rel="icon" th:href="@{/img/favicon.ico}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/user/auth.css}">
    <link rel="stylesheet" th:href="@{/css/user/join.css}">

    <script th:src="@{/js/user/auth.js}" defer></script>
    <script th:src="@{/js/user/signup.js}" defer></script>
</head>
<body>

<main class="auth-container">
    <section class="auth-image">
        <img th:src="@{/img/user/sign-up-screen.webp}" alt="Gallery aesthetic">
        <div class="image-overlay">
            <a th:href="@{/}" class="logo">SANG GALLERY</a>
            <p class="caption">이상혁 갤러리에 오신것을 환영합니다.</p>
        </div>
    </section>

    <section class="auth-content" aria-labelledby="signupTitle">
        <a th:href="@{/}" class="btn-back">Close ✕</a>

        <div class="form-wrapper">
            <a th:href="@{/}" class="logo-mobile">SANG GALLERY</a>

            <header class="form-header">
                <h1 id="signupTitle" class="auth-title">회원가입</h1>
                <p class="auth-subtitle">
                    이미 계정이 있으신가요?
                    <a th:href="@{/users/login}">Sign In</a>
                </p>
            </header>

            <p class="server-error-message"
               th:if="${errorMessage}"
               th:text="${errorMessage}">
            </p>

            <form id="joinForm" th:action="@{/users/signup}" method="post" novalidate>
                <div class="input-group">
                    <label for="idUser">ID</label>
                    <input type="text"
                           id="idUser"
                           name="idUser"
                           placeholder="5~15자리 아이디"
                           autocomplete="username"
                           required>
                    <p id="idUserError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="nmUser">Name</label>
                    <input type="text"
                           id="nmUser"
                           name="nmUser"
                           placeholder="이름"
                           autocomplete="name"
                           required>
                    <p id="nmUserError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="nmEmail">Email</label>
                    <input type="email"
                           id="nmEmail"
                           name="nmEmail"
                           placeholder="your@email.com"
                           autocomplete="email"
                           required>
                    <p id="nmEmailError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="nmPaswd">Password</label>
                    <div class="password-wrap">
                        <input type="password"
                               id="nmPaswd"
                               name="nmPaswd"
                               placeholder="대소문자/숫자 포함 5~15자"
                               autocomplete="new-password"
                               required>
                        <button type="button"
                                class="btn-password-toggle"
                                data-target="nmPaswd"
                                aria-label="비밀번호 표시">👁</button>
                    </div>
                    <p id="nmPaswdError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrap">
                        <input type="password"
                               id="confirmPassword"
                               placeholder="비밀번호 재입력"
                               autocomplete="new-password"
                               required>
                        <button type="button"
                                class="btn-password-toggle"
                                data-target="confirmPassword"
                                aria-label="비밀번호 확인 표시">👁</button>
                    </div>
                    <p id="confirmPasswordError" class="error-message"></p>
                </div>

                <div class="input-group">
                    <label for="noMobile">Phone</label>
                    <input type="tel"
                           id="noMobile"
                           name="noMobile"
                           placeholder="010-0000-0000"
                           autocomplete="tel"
                           maxlength="13"
                           required>
                    <p id="noMobileError" class="error-message"></p>
                </div>

                <div class="terms-section">
                    <label class="checkbox-group all-agree">
                        <input type="checkbox" id="checkAll">
                        <span>모든 약관에 동의합니다.</span>
                    </label>

                    <label class="checkbox-group">
                        <input type="checkbox" class="term-check" required>
                        <span>[필수] 이용약관 동의</span>
                    </label>

                    <label class="checkbox-group">
                        <input type="checkbox" class="term-check" required>
                        <span>[필수] 개인정보 수집 및 이용 동의</span>
                    </label>

                    <label class="checkbox-group">
                        <input type="checkbox" class="term-check">
                        <span>[선택] 이벤트 및 마케팅 정보 수신 동의</span>
                    </label>

                    <p id="termsError" class="error-message terms-error"></p>
                </div>

                <button type="submit" class="btn-submit">회원가입</button>
            </form>
        </div>
    </section>
</main>

</body>
</html>
