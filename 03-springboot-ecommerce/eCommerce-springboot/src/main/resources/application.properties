spring.application.name=eCommerce-springboot
spring.docker.compose.enabled=false

# ==================================================
# Oracle ?????? ?? ??
# ==================================================
spring.datasource.url=jdbc:oracle:thin:@dinkdb_medium?TNS_ADMIN=C:/SQLDEV/02_program/Wallet_DinkDB
spring.datasource.username=DA2617
spring.datasource.password=Data2617
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ==================================================
# HikariCP ??? ? ??
# ==================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ==================================================
# MyBatis ??
# ==================================================
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=kr.co.shop.domain
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL

# ==================================================
# JPA / Hibernate ??
# ==================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================================================
# Thymeleaf ??? ??
# ==================================================
spring.thymeleaf.cache=false

# ==================================================
# ?? ??? ?? ??
# ==================================================
spring.web.resources.cache.period=0

# ==================================================
# ?? ??? ??
# ==================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=C:/shop/upload

# ==================================================
# ?? ??
# ==================================================
server.servlet.session.timeout=30m

# ==================================================
# ?? ?? ??
# ==================================================
spring.web.error.whitelabel.enabled=false
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# ==================================================
# ?? ??
# ==================================================
logging.level.kr.co.shop=DEBUG
logging.level.kr.co.shop.mapper=TRACE
logging.level.org.mybatis=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==================================================
# Swagger / OpenAPI ??
# ==================================================
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.api-docs.path=/api-docs

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false