<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DINK GALLERY | Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css");
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

        :root {
            --white: #ffffff;
            --black: #0a0a0a;
            --soft-gray: #f9f9f9;
            --mid-gray: #888888;
            --line: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard Variable', 'Inter', sans-serif;
            background: var(--white);
            color: var(--black);
            -webkit-font-smoothing: antialiased;
            display: flex;
            min-height: 100vh;
        }

        a { color: inherit; text-decoration: none; transition: 0.2s; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }

        /* 전체 레이아웃 (스플릿 스크린) */
        .auth-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* 왼쪽: 브랜드 이미지 영역 (로그인용 감성 이미지) */
        .auth-image {
            display: none;
            position: relative;
            background-color: #000;
        }
        .auth-image img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
        }
        .image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.7));
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            color: var(--white);
        }
        .image-overlay .logo {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .image-overlay .caption {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        /* 오른쪽: 폼 영역 */
        .auth-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 24px;
            position: relative;
            overflow-y: auto;
        }

        /* 홈으로 돌아가기 버튼 */
        .btn-back {
            position: absolute;
            top: 40px;
            right: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--mid-gray);
            text-transform: uppercase;
        }
        .btn-back:hover { color: var(--black); }

        /* 폼 박스 */
        .form-wrapper {
            width: 100%;
            max-width: 380px; /* 로그인은 입력란이 적으므로 약간 더 슬림하게 */
            margin: auto 0;
        }

        .auth-title {
            font-size: 26px;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            font-size: 14px;
            color: var(--mid-gray);
            margin-bottom: 50px;
        }
        .auth-subtitle a {
            color: var(--black);
            font-weight: 600;
            text-decoration: underline;
        }

        /* 폼 요소 스타일 */
        .input-group {
            margin-bottom: 30px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--mid-gray);
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .input-group input {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--line);
            padding: 10px 0;
            font-size: 15px;
            color: var(--black);
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Pretendard Variable', 'Inter', sans-serif;
        }
        .input-group input:focus {
            border-bottom-color: var(--black);
        }
        .input-group input::placeholder {
            color: #cccccc;
            font-weight: 300;
        }

        /* 옵션 (상태 유지 / 비밀번호 찾기) */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -10px;
            margin-bottom: 40px;
        }

        /* 커스텀 디자인 체크박스 */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--dark-gray);
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--mid-gray);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }
        .checkbox-group input[type="checkbox"]:checked {
            background-color: var(--black);
            border-color: var(--black);
        }
        .checkbox-group input[type="checkbox"]:checked::after {
            content: '✓';
            color: var(--white);
            position: absolute;
            font-size: 11px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }

        .forgot-pw {
            font-size: 12px;
            color: var(--mid-gray);
            text-decoration: underline;
            transition: 0.2s;
        }
        .forgot-pw:hover {
            color: var(--black);
        }

        /* 메인 로그인 버튼 */
        .btn-submit {
            width: 100%;
            height: 56px;
            background: var(--black);
            color: var(--white);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background: #333;
        }

        /* 소셜 로그인 구분선 */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 40px 0;
            color: #aaaaaa;
            font-size: 10px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--line);
        }
        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }

        /* 소셜 로그인 버튼 */
        .social-login {
            display: flex;
            gap: 12px;
        }
        .btn-social {
            flex: 1;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--line);
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: var(--black);
            transition: 0.3s;
            gap: 8px;
        }
        .btn-social:hover {
            border-color: var(--black);
            background: var(--soft-gray);
        }

        /* 반응형 (PC 최적화) */
        @media (min-width: 900px) {
            .auth-image {
                display: block;
                flex: 1.2;
            }
            .auth-content {
                flex: 1;
                padding: 60px;
            }
            .logo-mobile {
                display: none;
            }
        }

        /* 모바일 최적화 */
        @media (max-width: 899px) {
            .btn-back { top: 24px; right: 24px; }
            .logo-mobile {
                display: block;
                font-family: 'Inter', sans-serif;
                font-size: 18px;
                font-weight: 900;
                letter-spacing: 2px;
                margin-bottom: 40px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-image">
        <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?w=1200&q=80" alt="Gallery Aesthetic">
        <div class="image-overlay">
            <a href="index.html" class="logo">SANG GALLERY</a>
            <p class="caption">Sign in to discover and collect original fine art photography.</p>
        </div>
    </div>

    <div class="auth-content">
        <a href="index.html" class="btn-back">Close ✕</a>

        <div class="form-wrapper">
            <a href="index.html" class="logo-mobile">DINK GALLERY</a>

            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">계정이 없으신가요? <a href="/users/join">Create Account</a></p>

            <form th:action="@{/users/login}" method="post">

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email"
                           id="userEmail"
                           name="userEmail"
                           placeholder="example@email.com"
                           required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password"
                           id="password"
                           name="userPassword"
                           placeholder="••••••••"
                           required>
                </div>

                <div class="form-options">
                    <label class="checkbox-group">
                        <input type="checkbox" name="rememberMe">
                        <span>로그인 상태 유지</span>
                    </label>
                    <a href="#" class="forgot-pw">비밀번호 찾기</a>
                </div>

                <button type="submit" class="btn-submit">SIGN IN</button>

                <div class="divider">or continue with</div>

                <div class="social-login">
                    <button type="button" class="btn-social">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="btn-social">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M25.565,9.785c-0.123,0.077-3.051,1.702-3.051,5.305c0.138,4.109,3.695,5.55,3.756,5.55 c-0.061,0.077-0.537,1.963-1.947,3.94C23.204,26.283,21.962,28,20.076,28c-1.794,0-2.438-1.135-4.508-1.135 c-2.223,0-2.852,1.135-4.554,1.135c-1.886,0-3.22-1.809-4.4-3.496c-1.533-2.208-2.836-5.673-2.882-9 c-0.031-1.763,0.307-3.496,1.165-4.968c1.211-2.055,3.373-3.45,5.734-3.496c1.809-0.061,3.419,1.242,4.523,1.242 c1.058,0,3.036-1.242,5.274-1.242C21.394,7.041,23.97,7.332,25.565,9.785z M15.001,6.688c-0.322-1.61,0.567-3.22,1.395-4.247 c1.058-1.242,2.729-2.085,4.17-2.085c0.092,1.61-0.491,3.189-1.533,4.339C18.098,5.937,16.488,6.872,15.001,6.688z"></path>
                        </svg>
                        Apple
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
