<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SANG GALLERY | 회원가입</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/member/join.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-image">
        <img src=/images/member/join/sign-up-screen.webp alt="Gallery Aesthetic">
        <div class="image-overlay">
            <a href="/" class="logo">SANG GALLERY</a>
            <p class="caption">Join our community and collect original fine art prints.</p>
        </div>
    </div>

    <div class="auth-content">
        <a href="/" class="btn-back">Close ✕</a>

        <div class="form-wrapper">
            <a href="/users/join" class="logo-mobile">DINK GALLERY</a>
            <h1 class="auth-title">회원가입</h1>
            <p class="auth-subtitle">이미 계정이 있으신가요? <a href="login.html">Sign In</a></p>

            <form id="joinForm">
                <div class="input-group">
                    <label>ID (아이디)</label>
                    <label for="userId"></label><input type="text" name="userId" id="userId" placeholder="5~15자리 아이디" required>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Last Name (성)</label>
                        <label for="lastName"></label>
                        <input type="text" id="lastName" placeholder="홍" required>
                    </div>
                    <div class="input-group">
                        <label>First Name (이름)</label>
                        <label for="firstName"></label>
                        <input type="text" id="firstName" placeholder="길동" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <label for="userEmail"></label>
                    <input type="email" name="userEmail" id="userEmail" placeholder="your@email.com" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <label for="password"></label>
                    <input type="password" id="password" name="userPassword" placeholder="대소문자/숫자 포함 5~15자" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <label for="confirmPassword"></label>
                    <input type="password" id="confirmPassword" placeholder="비밀번호 재입력" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <label for="userPhone"></label>
                    <input type="tel" name="userPhone" id="userPhone" placeholder="010-0000-0000" required>
                </div>

                <div class="terms-section">
                    <label class="checkbox-group all-agree">
                        <input type="checkbox" id="checkAll">
                        <span>모든 약관에 동의합니다.</span>
                    </label>
                    <label class="checkbox-group">
                        <input type="checkbox" class="term-check" required>
                        <span>[필수] 이용약관 동의</span>
                    </label>
                    <label class="checkbox-group">
                        <input type="checkbox" class="term-check" required>
                        <span>[필수] 개인정보 수집 및 이용 동의</span>
                    </label>
                    <label class="checkbox-group">
                        <input type="checkbox" class="term-check" name="marketingAgree">
                        <span>[선택] 이벤트 및 마케팅 정보 수신 동의</span>
                    </label>
                </div>

                <button type="submit" class="btn-submit">JOIN DINK GALLERY</button>
            </form>
        </div>
    </div>
</div>

<script src="/js/member/join.js"></script>
</body>
</html>
