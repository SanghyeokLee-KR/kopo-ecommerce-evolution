<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>

    <link rel="stylesheet" th:href="@{/css/member/join.css}">
    <script defer th:src="@{/js/member/join.js}"></script>
</head>
<body>

<div class="join-container">
    <h1 class="join-title">회원가입</h1>

    <form th:action="@{/users/join}" th:object="${userJoinRequest}" method="post" id="joinForm">

        <div class="global-error" th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>

        <div class="form-group">
            <label for="userId">아이디</label>
            <input type="text" id="userId" th:field="*{userId}" placeholder="5~15자리 아이디">
            <div class="field-error"
                 th:if="${#fields.hasErrors('userId')}"
                 th:errors="*{userId}">
            </div>
        </div>

        <div class="form-group">
            <label for="userName">이름</label>
            <input type="text" id="userName" th:field="*{userName}" placeholder="이름">
            <div class="field-error"
                 th:if="${#fields.hasErrors('userName')}"
                 th:errors="*{userName}">
            </div>
        </div>

        <div class="form-group">
            <label for="userPassword">비밀번호</label>
            <input type="password" id="userPassword" th:field="*{userPassword}" placeholder="대문자, 소문자, 숫자 포함 5~15자리">
            <div class="field-error"
                 th:if="${#fields.hasErrors('userPassword')}"
                 th:errors="*{userPassword}">
            </div>
        </div>

        <div class="form-group">
            <label for="userPhone">휴대전화</label>
            <input type="text" id="userPhone" th:field="*{userPhone}" placeholder="010-0000-0000">
            <div class="field-error"
                 th:if="${#fields.hasErrors('userPhone')}"
                 th:errors="*{userPhone}">
            </div>
        </div>

        <div class="form-group">
            <label for="userEmail">이메일</label>
            <input type="email" id="userEmail" th:field="*{userEmail}" placeholder="example@email.com">
            <div class="field-error"
                 th:if="${#fields.hasErrors('userEmail')}"
                 th:errors="*{userEmail}">
            </div>
        </div>

        <button type="submit" class="join-button">가입하기</button>

        <div class="login-link">
            이미 계정이 있으신가요?
            <a th:href="@{/login}">로그인</a>
        </div>
    </form>
</div>

</body>
</html>
