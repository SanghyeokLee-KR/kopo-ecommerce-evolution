# ==================================================
# Application Basic Settings
# ==================================================
spring.application.name=eCommerce-springboot
spring.docker.compose.enabled=false

# ==================================================
# Oracle Database Connection Settings
# Copy this file to application.properties and replace
# the placeholder values with your actual credentials.
# ==================================================
spring.datasource.url=jdbc:oracle:thin:@YOUR_DB_ALIAS?TNS_ADMIN=C:/path/to/Wallet
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ==================================================
# HikariCP Connection Pool Settings
# ==================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ==================================================
# JPA Settings
# ==================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================================================
# MyBatis Settings
# ==================================================
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=kr.co.shop.domain
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL

# ==================================================
# Thymeleaf Settings
# ==================================================
spring.thymeleaf.cache=false

# ==================================================
# File Upload Settings
# ==================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==================================================
# Custom Upload Directory
# ==================================================
app.upload.path=uploads/products

# ==================================================
# Logging Settings
# ==================================================
logging.level.root=INFO
logging.level.kr.co.shop=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ==================================================
# Springdoc OpenAPI (Swagger)
# ==================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==================================================
# Actuator Settings
# ==================================================
management.endpoints.web.exposure.include=health,info,metrics

# ==================================================
# Security Settings
# ==================================================
spring.security.user.name=admin
spring.security.user.password=admin